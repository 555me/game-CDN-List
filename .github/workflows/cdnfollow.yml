
name: CDNupdate

on:
  push:
    paths:
      - bny.py
      - .git/workflows/cdnfollow.yml
  repository_dispatch:
    types: [cdn_cf] 

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    
    steps:
    - name: kd
      uses: actions/checkout@v4
      
    - name: cA
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Oq
      run: pip install requests

    - name: cr
      run: python bny.py

    - name: uc
      run: |
        git config --local user.email "hihihi@github.com"
        git config --local user.name "CDNfollower"
        git add data/
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "cdn update $(date +'%Y-%m-%d %H:%M:%S') UTC"
          git push
        fi
